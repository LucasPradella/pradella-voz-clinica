version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: pradella-db
    environment:
      POSTGRES_DB: pradella_dev
      POSTGRES_USER: pradella
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pradella -d pradella_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
